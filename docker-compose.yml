services:
  db:
    image: postgres:16-alpine
    container_name: arcon-api-explorer-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: arcon-api-explorer-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d arcon-api-explorer-db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
